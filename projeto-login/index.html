<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mq.css">
</head>
<body>
    <section>
        <div id="img"></div>
        <div id="login">
            <h1>Login</h1>
            <p>É bom te ver de volta! Faça login para aproveitar o máximo.</p>
            <form action="login.php" method="post" autocomplete="on">
                <div class="input-per">
                    <label for="email"><img src="imagens/email.png" alt=""></label>
                    <input type="email" name="email" id="email" placeholder="E-mail" required>
                </div>
                <div class="input-per">
                    <label for="senha"><img src="imagens/senha.png" alt=""></label>
                    <input type="password" name="senha" id="senha" placeholder="Senha" required>
                </div>
                <div class="botao">
                    <input id="enviar-btn" type="submit" value="Entrar">
                </div>
                <div class="botao">
                    <a href="#" id="rec-senha">Esqueci a senha</a>
                </div>
                <div class="cadastrar-opt">
                    <a href="#">Criar uma conta</a>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
